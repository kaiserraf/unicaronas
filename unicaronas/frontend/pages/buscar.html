<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniCaronas — Buscar caronas</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    #resultado-lista { display: flex; flex-direction: column; gap: 1rem; }
  </style>
</head>
<body>
<nav class="navbar" aria-label="Navegação principal">
  <div class="container" style="display:flex;align-items:center;justify-content:space-between;">
    <a href="../pages/dashboard.html" class="navbar-brand">Uni<span>Caronas</span></a>
    <ul class="navbar-links" role="list" style="list-style:none;">
      <li><a href="../pages/dashboard.html">Painel</a></li>
      <li><a href="../pages/buscar.html" aria-current="page">Buscar carona</a></li>
      <li><a href="../pages/criar-carona.html">Oferecer carona</a></li>
      <li><a href="../pages/perfil.html">Perfil</a></li>
    </ul>
    <button class="btn btn-ghost btn-sm" id="btn-logout" type="button">Sair</button>
  </div>
</nav>

  <div class="container">
    <div class="page-header fade-up">
      <h2>Buscar caronas</h2>
      <p>Encontre uma carona disponível no seu trajeto</p>
    </div>

    <div class="filtros fade-up">
      <div class="filtros-grid">
        <div class="form-group" style="margin:0">
          <label class="form-label">Origem</label>
          <input class="form-control" id="f-origem" type="text" placeholder="Bairro ou endereço">
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Destino</label>
          <input class="form-control" id="f-destino" type="text" placeholder="Campus ou endereço">
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Data</label>
          <input class="form-control" id="f-data" type="date">
        </div>
        <button class="btn btn-primary" onclick="buscar()">Buscar</button>
      </div>
    </div>

    <div id="resultado-lista">
      <p class="text-muted">Carregando...</p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    protegerRota();

    function renderCarona(c) {
      return `
        <div class="carona-card fade-up">
          <div class="carona-rota">
            <span class="local">${c.origem}</span>
            <div class="route-line"></div>
            <div class="route-dot"></div>
            <span class="local">${c.destino}</span>
          </div>
          <div class="carona-meta">
            <div class="meta-item">
              <span class="meta-label">Horário</span>
              <span class="meta-value">${formatarData(c.horario_partida)}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Vagas</span>
              <span class="meta-value">${c.vagas_disponiveis} disponíveis</span>
            </div>
            ${c.distancia_km ? `<div class="meta-item"><span class="meta-label">Distância</span><span class="meta-value">${c.distancia_km} km</span></div>` : ''}
          </div>
          ${c.observacoes ? `<p style="font-size:.85rem;color:var(--text-3);margin-bottom:1rem">${c.observacoes}</p>` : ''}
          <div class="carona-footer">
            <div class="user-row">
              <div class="avatar">${iniciais(c.motorista_nome)}</div>
              <div>
                <div class="user-name">${c.motorista_nome}</div>
                <div class="user-rating">${parseFloat(c.motorista_avaliacao||0).toFixed(1)} — motorista</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:1rem">
              <div>
                <div class="preco-label">Por pessoa</div>
                <div class="preco-valor">${formatarMoeda(c.valor_cobrado)}</div>
              </div>
              <a href="carona.html?id=${c.id}" class="btn btn-ghost btn-sm">Ver detalhes</a>
            </div>
          </div>
        </div>`;
    }

    async function buscar() {
      const params = {};
      const origem  = document.getElementById('f-origem').value.trim();
      const destino = document.getElementById('f-destino').value.trim();
      const data    = document.getElementById('f-data').value;
      if (origem)  params.origem  = origem;
      if (destino) params.destino = destino;
      if (data)    params.data    = data;

      const lista = document.getElementById('resultado-lista');
      lista.innerHTML = '<p class="text-muted">Buscando...</p>';

      try {
        const res = await api.listarCaronas(params);
        if (res.data.length === 0) {
          lista.innerHTML = '<div class="empty-state"><p>Nenhuma carona encontrada para este trajeto.</p></div>';
          return;
        }
        lista.innerHTML = res.data.map(renderCarona).join('');
      } catch(err) {
        lista.innerHTML = `<div class="empty-state"><p>${err.message}</p></div>`;
      }
    }

    buscar();

    document.getElementById('btn-logout')?.addEventListener('click', () => logout());
  </script>
</body>
</html>
