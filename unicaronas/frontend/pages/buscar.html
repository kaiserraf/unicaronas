<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniCaronas — Buscar caronas</title>
  <link rel="icon" type="image/png" href="../img/icon.png?v=2">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/autocomplete.css">
  <script src="../js/theme.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    #resultado-lista { 
      display: grid; 
      grid-template-columns: 1fr; 
      gap: 1.5rem; 
    }
    @media (min-width: 1200px) {
      #resultado-lista { grid-template-columns: 1fr 1fr; }
    }
    .filtros-grid { 
      grid-template-columns: 1fr 1fr 1fr 1fr auto !important; 
      gap: 1.25rem !important;
      align-items: end !important;
    }
    @media (max-width: 992px) {
      .filtros-grid { 
        grid-template-columns: 1fr 1fr !important; 
      }
      .filtros-grid .btn-primary {
        grid-column: span 2;
      }
    }
    @media (max-width: 600px) { 
      .filtros-grid { 
        grid-template-columns: 1fr !important; 
      } 
      .filtros-grid .btn-primary {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="container">
    <div class="page-header fade-up">
      <h2 data-i18n="search-title">Buscar caronas</h2>
      <p data-i18n="search-sub">Encontre uma carona disponível no seu trajeto</p>
    </div>

    <div class="filtros fade-up">
      <!-- Dica consolidada para busca -->
      <div style="margin-bottom: 1.25rem; font-size: 0.8rem; color: var(--text-3); display: flex; align-items: center; gap: 0.5rem; background: var(--bg-2); padding: 0.75rem 1rem; border-radius: var(--radius-sm); border-left: 3px solid var(--accent);">
        <i data-lucide="info" style="width: 16px; height: 16px; color: var(--accent); flex-shrink: 0;"></i>
        <span>Dica: Busque por Bairro, Rua ou nome da Universidade (ex: UniBrasil).</span>
      </div>

      <div class="filtros-grid">
        <div class="form-group" style="margin:0">
          <label class="form-label" data-i18n="filter-origin">Origem</label>
          <input class="form-control" id="f-origem" type="text" placeholder="Bairro ou endereço" data-i18n="filter-origin">
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label" data-i18n="filter-destination">Destino</label>
          <input class="form-control" id="f-destino" type="text" placeholder="Campus ou endereço" data-i18n="filter-destination">
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label" data-i18n="filter-date">Data</label>
          <input class="form-control" id="f-data" type="date">
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Preço Máximo</label>
          <input class="form-control" id="f-preco" type="number" placeholder="R$">
        </div>
        <button class="btn btn-primary" onclick="buscar()" data-i18n="btn-filter" style="height: 42px;">Buscar</button>
      </div>
    </div>

    <div id="resultado-lista">
      <p class="text-muted" data-i18n="welcome-loading">Carregando...</p>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-content">
      <div class="navbar-brand-img" style="margin-bottom: 1rem;"></div>
      <div class="footer-dev">Desenvolvido pelas divas: <a href="#">Ariane Archanjo</a>, <a href="#">Matheus Sizanoski</a>, <a href="#">Pedro Kafka</a> e <a href="#">Rafael Machado</a></div>
      <div class="footer-copyright">© 2026 UniCaronas — Todos os direitos reservados.</div>
    </div>
  </footer>

  <script src="../js/api.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/autocomplete.js"></script>
  <script>
    protegerRota();

    // Inicialização do Autocomplete
    new AddressAutocomplete(document.getElementById('f-origem'));
    new AddressAutocomplete(document.getElementById('f-destino'));

    window.addEventListener('languageChanged', () => {
      buscar();
    });

    function renderCarona(c) {
      return `
        <div class="carona-card fade-up">
          <div class="carona-rota">
            <span class="local">${c.origem}</span>
            <div class="route-line"></div>
            <div class="route-dot"></div>
            <span class="local">${c.destino}</span>
            ${c.recorrente ? `<span class="badge-semanal">Semanal</span>` : ''}
          </div>
          <div style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-2); font-weight: 500; display: flex; align-items: center; gap: 0.4rem;">
            <span style="color: var(--accent); display: flex; align-items: center; gap: 0.25rem;"><i data-lucide="map-pin" style="width: 14px; height: 14px;"></i> Ponto de encontro:</span> ${c.ponto_encontro}
          </div>
          ${c.itinerario ? `
            <div style="margin-top: 0.25rem; font-size: 0.8rem; color: var(--text-3); background: var(--surface-2); padding: 0.4rem 0.6rem; border-radius: var(--radius-sm); border-left: 2px solid var(--accent);">
              <span style="font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 2px;">Itinerário</span>
              ${c.itinerario}
            </div>
          ` : ''}
          <div class="carona-meta" style="margin-top: 0.75rem;">
            <div class="meta-item">
              <span class="meta-label">${t('card-time')}</span>
              <span class="meta-value">${formatarData(c.horario_partida)}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">${t('card-vagas')}</span>
              <span class="meta-value">${c.vagas_disponiveis} ${t('card-vagas-avail')}</span>
            </div>
            ${c.distancia_km ? `<div class="meta-item"><span class="meta-label">${t('card-dist')}</span><span class="meta-value">${c.distancia_km} km</span></div>` : ''}
          </div>
          ${c.observacoes ? `<p style="font-size:.85rem;color:var(--text-3);margin-bottom:1rem">${c.observacoes}</p>` : ''}
          <div class="carona-footer">
            <div class="user-row">
              <div class="avatar">${iniciais(c.motorista_nome)}</div>
              <div>
                <div class="user-name">${c.motorista_nome}</div>
                <div class="user-rating">${parseFloat(c.motorista_avaliacao||0).toFixed(1)} — ${currentLang === 'pt' ? 'motorista' : 'driver'}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:1rem">
              <div>
                <div class="preco-label">${t('card-price-per-person')}</div>
                <div class="preco-valor">${formatarMoeda(c.valor_cobrado)}</div>
              </div>
              <a href="carona.html?id=${c.id}" class="btn btn-ghost btn-sm">${t('card-details')}</a>
            </div>
          </div>
        </div>`;
    }

    async function buscar() {
      const params = {};
      const origem  = document.getElementById('f-origem').value.trim();
      const destino = document.getElementById('f-destino').value.trim();
      const data    = document.getElementById('f-data').value;
      const preco   = document.getElementById('f-preco').value;
      if (origem)  params.origem  = origem;
      if (destino) params.destino = destino;
      if (data)    params.data    = data;
      if (preco)   params.preco_max = preco;

      const lista = document.getElementById('resultado-lista');
      lista.innerHTML = `<p class="text-muted">${currentLang === 'pt' ? 'Buscando...' : 'Searching...'}</p>`;

      try {
        const res = await api.listarCaronas(params);
        if (res.data.length === 0) {
          lista.innerHTML = `<div class="empty-state"><p>${t('empty-rides')}</p></div>`;
          return;
        }
        lista.innerHTML = res.data.map(renderCarona).join('');
        lucide.createIcons();
      } catch(err) {
        lista.innerHTML = `<div class="empty-state"><p>${err.message}</p></div>`;
      }
    }

    buscar();

    document.getElementById('btn-logout')?.addEventListener('click', () => logout());
  </script>
  <script src="../js/chat-global.js"></script>
</body>
</html>
