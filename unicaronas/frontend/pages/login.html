<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniCaronas — Acesso ao Sistema</title>
  <link rel="icon" type="image/png" href="../img/icon.png?v=2">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/theme.js"></script>
  <style>
    .login-wrap { 
      min-height: calc(100vh - 180px); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 3rem 0;
    }
    .login-card { 
      width: 100%; 
      max-width: 400px; 
      padding: 2.5rem; 
    }
    .login-header { text-align: center; margin-bottom: 2rem; }
    .login-header h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: .5rem; }
    .login-header p { color: var(--text-2); font-size: .9rem; }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="container">
    <div class="login-wrap">
      <div class="card login-card fade-up">
        <div class="login-header">
          <h1 data-i18n="login-title">Bem-vindo</h1>
          <p data-i18n="login-sub">Acesse sua conta para continuar</p>
        </div>

        <div id="alert-container"></div>

        <form id="form-login">
          <div class="form-group">
            <label class="form-label" data-i18n="label-email">E-mail Institucional</label>
            <input type="email" id="email" class="form-control" placeholder="nome@uni.edu.br" required>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="label-password">Senha</label>
            <input type="password" id="senha" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full mt-2" id="btn-login" data-i18n="btn-login">Entrar</button>
        </form>

        <div class="divider"></div>
        <p class="text-center text-muted" style="font-size: .82rem">
          <span data-i18n="login-no-account">Não tem uma conta?</span> 
          <a href="cadastro.html" data-i18n="btn-register">Cadastre-se</a>
        </p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-content">
      <div class="navbar-brand-img" style="margin-bottom: 1rem;"></div>
      <div class="footer-copyright">© 2026 UniCaronas — Todos os direitos reservados.</div>
    </div>
  </footer>

  <script src="../js/api.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    if (isLogado()) window.location.href = 'dashboard.html';

    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const btn = document.getElementById('btn-login');

      btn.disabled = true;
      btn.textContent = currentLang === 'pt' ? 'Entrando...' : 'Logging in...';

      try {
        const res = await api.login({ email, senha });
        setToken(res.data.token);
        setUser(res.data.usuario);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showAlert(err.message, 'error');
        btn.disabled = false;
        btn.textContent = t('btn-login');
      }
    });
  </script>
</body>
</html>
