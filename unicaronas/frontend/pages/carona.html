<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniCaronas — Detalhes da carona</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .detalhe-layout {
      display: grid; grid-template-columns: 1fr 380px;
      gap: 1.5rem; padding-bottom: 3rem;
    }
    .detalhe-rota {
      font-size: 1.3rem; font-weight: 700;
      letter-spacing: -.4px; margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
    }
    .rota-arrow { color: var(--accent); font-size: 1rem; font-weight: 300; }
    .preco-destaque {
      font-size: 2.5rem; font-weight: 700;
      color: var(--text); font-variant-numeric: tabular-nums;
    }
    
    /* Star rating */
    .rating-input { display: flex; gap: 0.5rem; flex-direction: row-reverse; justify-content: flex-end; margin: 1rem 0; }
    .rating-input input { display: none; }
    .rating-input label { cursor: pointer; width: 24px; height: 24px; background: var(--border); clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); }
    .rating-input input:checked ~ label, .rating-input label:hover, .rating-input label:hover ~ label { background: var(--amber); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; display: none; }
    .modal-box { background: var(--surface); padding: 2rem; border-radius: var(--radius-lg); width: 100%; max-width: 400px; }

    /* Botão de chat com pulso */
    .btn-chat-iniciar {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--green-dim); color: var(--green);
      border: 1px solid rgba(34,211,160,.25);
      padding: .55rem 1.1rem; border-radius: var(--radius-sm);
      font-family: var(--font); font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: all .18s; white-space: nowrap;
    }
    .btn-chat-iniciar:hover {
      background: rgba(34,211,160,.18);
      border-color: rgba(34,211,160,.45);
      transform: translateY(-1px);
    }
    .btn-chat-iniciar:active { transform: scale(.97); }
    .btn-chat-iniciar svg { flex-shrink: 0; }

    /* Badge "chat disponível" */
    .chat-disponivel-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .72rem; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; color: var(--green);
      background: var(--green-dim); border: 1px solid rgba(34,211,160,.2);
      border-radius: 99px; padding: .2rem .65rem;
    }
    .chat-disponivel-badge::before {
      content: ''; display: block;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: pulse-green 1.8s infinite;
    }
    @keyframes pulse-green {
      0%, 100% { opacity: 1; }
      50%       { opacity: .35; }
    }

    @media(max-width:860px){ .detalhe-layout{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
<nav class="navbar" aria-label="Navegação principal">
  <div class="container" style="display:flex;align-items:center;justify-content:space-between;">
    <a href="../pages/dashboard.html" class="navbar-brand">Uni<span>Caronas</span></a>
    <ul class="navbar-links" role="list" style="list-style:none;">
      <li><a href="../pages/dashboard.html" data-i18n="nav-dashboard">Painel</a></li>
      <li><a href="../pages/buscar.html" data-i18n="nav-buscar">Buscar carona</a></li>
      <li><a href="../pages/criar-carona.html" data-i18n="nav-oferecer">Oferecer carona</a></li>
      <li><a href="../pages/perfil.html" data-i18n="nav-perfil">Perfil</a></li>
    </ul>
    <button class="btn btn-ghost btn-sm" id="btn-logout" type="button" data-i18n="nav-sair">Sair</button>
  </div>
</nav>

  <div class="container">
    <div id="alert-container" style="margin-top:1rem"></div>
    <div id="conteudo" style="padding:2rem 0">
      <p class="text-muted" data-i18n="welcome-loading">Carregando...</p>
    </div>
    <div id="area-motorista" style="display:none">
      <div class="section-label" style="margin-top:2.5rem" data-i18n="label-my-requests">Solicitações na sua carona</div>
      <div id="lista-solicitacoes">
        <p class="text-muted" data-i18n="welcome-loading">Carregando...</p>
      </div>  
    </div>
  </div>

  <!-- Modal de Avaliação -->
  <div id="modal-avaliacao" class="modal-overlay">
    <div class="modal-box">
      <h3 style="margin-bottom:1rem" data-i18n="profile-stats-rating">Avaliar Usuário</h3>
      <div class="form-group">
        <label class="form-label" data-i18n="stat-my-rating">Sua nota</label>
        <div class="rating-input" id="stars">
          <input type="radio" name="nota" value="5" id="s5"><label for="s5"></label>
          <input type="radio" name="nota" value="4" id="s4"><label for="s4"></label>
          <input type="radio" name="nota" value="3" id="s3"><label for="s3"></label>
          <input type="radio" name="nota" value="2" id="s2"><label for="s2"></label>
          <input type="radio" name="nota" value="1" id="s1"><label for="s1"></label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="label-obs">Comentário (opcional)</label>
        <textarea id="comentario-nota" class="form-control" rows="3" placeholder="Como foi a experiência?"></textarea>
      </div>
      <div style="display:flex;gap:1rem;margin-top:1.5rem">
        <button class="btn btn-ghost" onclick="fecharModal()" data-i18n="btn-cancel">Cancelar</button>
        <button class="btn btn-primary btn-full" onclick="enviarAvaliacao()" data-i18n="profile-stats-rating">Enviar Avaliação</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/chat-global.js"></script>
  <script>
    protegerRota();
    const usuario      = getUser();
    const id           = new URLSearchParams(location.search).get('id');
    let   solicitacaoId = null;
    let   caronaCache   = null; // cache da carona para usar no botão de chat
    let   pollingChatLateral = null;
    let   ultimaMensagemId   = 0;

    if (!id) location.href = 'buscar.html';

    window.addEventListener('languageChanged', () => {
      carregarDados();
    });

    async function carregarDados() {
      try {
        const res  = await api.buscarCarona(id);
        const c    = res.data;
        caronaCache = c;
        const sou_motorista = c.motorista_id === usuario?.id;

        let minhaSol = null;
        if (!sou_motorista) {
          const resSol = await api.minhaSolicitacao(id);
          minhaSol = resSol.data;
          solicitacaoId = minhaSol?.id;
        }

        // Se a solicitação foi aceita, mostra o chat lateral (US08) e link de pagamento (US09)
        const showChat = (sou_motorista) || (minhaSol?.status === 'aceita');
        
        const pagamentoHtml = (!sou_motorista && minhaSol?.status === 'aceita') ? `
          <div class="card mb-2 fade-up" style="background: var(--green-dim); border: 1px solid rgba(34,211,160,.3)">
            <div style="display:flex; align-items:center; justify-content:space-between; gap:1rem">
              <div>
                <div style="font-weight:700; color:var(--green)">Vaga confirmada!</div>
                <div style="font-size:0.85rem; color:var(--text-2)">Realize o pagamento para garantir sua vaga.</div>
              </div>
              <a href="pagamento.html?solicitacao_id=${minhaSol.id}&carona_id=${id}&valor=${c.valor_cobrado}" class="btn btn-success btn-sm">Pagar R$ ${c.valor_cobrado}</a>
            </div>
          </div>` : '';

        document.getElementById('conteudo').innerHTML = `
          ${pagamentoHtml}
          <div class="detalhe-layout">
            <div>
              <div class="page-header" style="padding-top:1.5rem">
                <div class="detalhe-rota fade-up">
                  <span>${c.origem}</span>
                  <span class="rota-arrow">→</span>
                  <span>${c.destino}</span>
                </div>
              </div>
              <div class="card mb-2 fade-up fade-up-1">
                <div class="card-title">${currentLang === 'pt' ? 'Detalhes da viagem' : 'Trip details'}</div>
                <div class="info-row"><span class="label">${currentLang === 'pt' ? 'Data e hora' : 'Date and time'}</span><span class="value">${formatarData(c.horario_partida)}</span></div>
                <div class="info-row"><span class="label">${t('card-vagas')}</span><span class="value">${c.vagas_disponiveis} ${currentLang === 'pt' ? 'de' : 'of'} ${c.vagas_totais}</span></div>
                <div class="info-row"><span class="label">Status</span><span class="value"><span class="badge ${c.status === 'concluida' ? 'badge-green' : 'badge-accent'}">${c.status}</span></span></div>
                ${c.distancia_km ? `<div class="info-row"><span class="label">${currentLang === 'pt' ? 'Distância estimada' : 'Estimated distance'}</span><span class="value">${c.distancia_km} km</span></div>` : ''}
                ${c.observacoes ? `<div class="info-row"><span class="label">${t('label-obs')}</span><span class="value">${c.observacoes}</span></div>` : ''}
              </div>
              <div class="card fade-up fade-up-2">
                <div class="card-title">${currentLang === 'pt' ? 'Motorista' : 'Driver'}</div>
                <div class="user-row">
                  <div class="avatar avatar-lg">${iniciais(c.motorista_nome)}</div>
                  <div>
                    <div style="font-size:1.05rem;font-weight:700">${c.motorista_nome}</div>
                    <div class="user-rating" style="margin-top:.2rem">${parseFloat(c.motorista_avaliacao||0).toFixed(1)} ★ ${currentLang === 'pt' ? 'de avaliação média' : 'average rating'}</div>
                    ${c.motorista_telefone ? `<div style="font-size:.82rem;color:var(--text-3);margin-top:.2rem">${c.motorista_telefone}</div>` : ''}
                  </div>
                </div>
              </div>
            </div>
            <div>
              <div class="card mb-2 fade-up" style="text-align:center;padding:2rem">
                <div style="font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:.5rem">${t('card-price-per-person')}</div>
                <div class="preco-destaque">${formatarMoeda(c.valor_cobrado)}</div>
                
                ${!sou_motorista && !minhaSol && c.status === 'ativa' && c.vagas_disponiveis > 0 ? `
                <div style="margin-top:1.5rem">
                  <button class="btn btn-success btn-full" onclick="solicitar()">${currentLang === 'pt' ? 'Solicitar vaga' : 'Request seat'}</button>
                </div>` : ''}

                ${!sou_motorista && minhaSol?.status === 'aceita' ? `
                <div style="margin-top:1.5rem">
                  <span class="badge badge-green">${currentLang === 'pt' ? 'Vaga confirmada' : 'Seat confirmed'}</span>
                  <button class="btn btn-primary btn-full mt-1" onclick="abrirModal(${c.motorista_id}, ${minhaSol.id})">${currentLang === 'pt' ? 'Avaliar Motorista' : 'Rate Driver'}</button>
                </div>` : ''}

                ${!sou_motorista && minhaSol?.status === 'pendente' ? `
                <div style="margin-top:1.5rem"><span class="badge badge-accent">${currentLang === 'pt' ? 'Aguardando resposta' : 'Waiting for response'}</span></div>` : ''}

                ${sou_motorista && c.status !== 'concluida' ? `
                <div style="margin-top:1.5rem">
                  <button class="btn btn-success btn-full" onclick="concluirCarona()">${currentLang === 'pt' ? 'Concluir carona' : 'Finish ride'}</button>
                </div>` : ''}
                
                ${sou_motorista && c.status === 'concluida' ? `
                <div style="margin-top:1.5rem"><span class="badge badge-green">${currentLang === 'pt' ? 'Viagem finalizada' : 'Trip finished'}</span></div>` : ''}
              </div>

              <!-- Chat Lateral (US08) -->
              <div id="container-chat-lateral" style="display: ${showChat && !sou_motorista ? 'block' : 'none'}">
                <div id="chat-lateral">
                  <div class="chat-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Chat com Motorista
                  </div>
                  <div id="chat-msgs"></div>
                  <div class="chat-input-area">
                    <input type="text" id="input-chat-lateral" placeholder="Digite uma mensagem..." maxlength="500">
                    <button class="btn btn-primary btn-sm" id="btn-enviar-lateral" onclick="enviarMensagemLateral()">Enviar</button>
                  </div>
                </div>
              </div>
            </div>
          </div>`;

        if (sou_motorista) {
          document.getElementById('area-motorista').style.display = 'block';
          carregarSolicitacoes();
        }

        if (!sou_motorista && minhaSol?.status === 'aceita') {
          iniciarPollingChat(minhaSol.id);
        }

      } catch(err) {
        document.getElementById('conteudo').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    // --- Lógica do Chat Lateral (US08) ---
    function iniciarPollingChat(sid) {
      if (pollingChatLateral) clearInterval(pollingChatLateral);
      solicitacaoId = sid;
      carregarMensagensLaterais();
      pollingChatLateral = setInterval(carregarMensagensLaterais, 5000);
      
      // Enter para enviar
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && document.activeElement.id === 'input-chat-lateral') {
          enviarMensagemLateral();
        }
      });
    }

    async function carregarMensagensLaterais() {
      if (!solicitacaoId) return;
      try {
        const res = await api.listarMensagens(solicitacaoId);
        const msgs = res.data;
        const box = document.getElementById('chat-msgs');
        if (!box) return;

        box.innerHTML = msgs.map(m => {
          const eu = m.remetente_id === usuario.id;
          return `
            <div class="msg-bubble ${eu ? 'msg-me' : 'msg-other'}">
              ${!eu ? `<div class="msg-meta">${m.remetente_nome}</div>` : ''}
              ${esc(m.conteudo)}
            </div>
          `;
        }).join('');
        
        // Scroll para o fim apenas se houver novas mensagens
        if (msgs.length > 0 && msgs[msgs.length - 1].id !== ultimaMensagemId) {
          box.scrollTop = box.scrollHeight;
          ultimaMensagemId = msgs[msgs.length - 1].id;
        }
      } catch (err) { console.error('Erro no chat lateral:', err); }
    }

    async function enviarMensagemLateral() {
      const input = document.getElementById('input-chat-lateral');
      const conteudo = input.value.trim();
      if (!conteudo || !solicitacaoId) return;

      input.value = '';
      try {
        await api.enviarMensagem({ solicitacao_id: solicitacaoId, conteudo });
        carregarMensagensLaterais();
      } catch (err) { showAlert(err.message, 'error'); }
    }

    // --- Lógica de Solicitações (US08b) ---
    async function carregarSolicitacoes() {
      const pendentesContainer = document.getElementById('lista-solicitacoes-pendentes');
      const aceitasContainer = document.getElementById('lista-solicitacoes-aceitas');
      
      try {
        const res = await api.solicitacoesCarona(id);
        const solicitacoes = res.data;
      
        const pendentes = solicitacoes.filter(s => s.status === 'pendente');
        const aceitas   = solicitacoes.filter(s => s.status === 'aceita');

        pendentesContainer.innerHTML = pendentes.length === 0 
          ? '<p class="text-muted">Nenhuma solicitação pendente.</p>'
          : pendentes.map(s => `
            <div class="card mb-2" style="border-left: 4px solid var(--amber)">
              <div style="display:flex; justify-content:space-between; align-items:center">
                <div class="user-row">
                  <div class="avatar">${iniciais(s.passageiro_nome)}</div>
                  <div>
                    <div class="user-name">${s.passageiro_nome}</div>
                    <div class="user-rating">${s.passageiro_curso || 'Curso não informado'} · ${parseFloat(s.passageiro_avaliacao || 0).toFixed(1)} ★</div>
                  </div>
                </div>
                <div style="display:flex; gap:0.5rem">
                  <button class="btn btn-success btn-sm" onclick="responder(${s.id}, 'aceita')">Aceitar</button>
                  <button class="btn btn-danger btn-sm"  onclick="responder(${s.id}, 'recusada')">Recusar</button>
                </div>
              </div>
            </div>`).join('');

        aceitasContainer.innerHTML = aceitas.length === 0
          ? '<p class="text-muted">Nenhum passageiro confirmado ainda.</p>'
          : aceitas.map(s => `
            <div class="card mb-2" style="border-left: 4px solid var(--green)">
              <div style="display:flex; justify-content:space-between; align-items:center">
                <div class="user-row">
                  <div class="avatar">${iniciais(s.passageiro_nome)}</div>
                  <div>
                    <div class="user-name">${s.passageiro_nome}</div>
                    <div class="user-rating">${s.passageiro_curso || 'Curso não informado'} · ${parseFloat(s.passageiro_avaliacao || 0).toFixed(1)} ★</div>
                  </div>
                </div>
                <div style="display:flex; gap:0.5rem; align-items:center">
                  <button class="btn btn-primary btn-sm" onclick="abrirChatMotorista(${s.id}, '${esc(s.passageiro_nome)}')">Chat</button>
                  <button class="btn btn-ghost btn-sm" onclick="abrirModal(${s.passageiro_id}, ${s.id})">Avaliar</button>
                </div>
              </div>
            </div>`).join('');

      } catch (err) {
        pendentesContainer.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    async function responder(sid, status) {
      try {
        await api.responderSolicitacao(sid, status);
        showAlert(`Solicitação ${status === 'aceita' ? 'aceita' : 'recusada'}!`, 'success');
        carregarDados(); // Recarrega para atualizar vagas e listas
      } catch (err) { showAlert(err.message, 'error'); }
    }

    function abrirChatMotorista(sid, nome) {
      // Motorista usa o chat global ou podemos abrir o lateral também. 
      // Para seguir o requisito de "Chat lateral em carona.html", vamos abrir o lateral:
      const container = document.getElementById('container-chat-lateral');
      container.style.display = 'block';
      document.querySelector('.chat-header').innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Chat com ${nome}
      `;
      iniciarPollingChat(sid);
      window.scrollTo({ top: container.offsetTop - 100, behavior: 'smooth' });
    }

    // --- Funções originais mantidas ---
    function esc(str) { return String(str || '').replace(/'/g, "\\'"); }
    
    async function solicitar() {
      try {
        await api.solicitarVaga(id);
        showAlert(currentLang === 'pt' ? 'Solicitação enviada!' : 'Request sent!', 'success');
        carregarDados();
      } catch(err) { showAlert(err.message, 'error'); }
    }

    async function concluirCarona() {
      if (!confirm(currentLang === 'pt' ? 'Deseja marcar esta carona como concluída?' : 'Do you want to mark this ride as finished?')) return;
      try {
        await api.concluirCarona(id);
        showAlert(currentLang === 'pt' ? 'Carona concluída!' : 'Ride finished!', 'success');
        carregarDados();
      } catch(err) { showAlert(err.message, 'error'); }
    }

    function abrirModal(avaliadoId, solId) {
      avaliandoId = avaliadoId;
      avaliandoSolId = solId;
      document.getElementById('modal-avaliacao').style.display = 'flex';
    }

    function fecharModal() {
      document.getElementById('modal-avaliacao').style.display = 'none';
    }

    async function enviarAvaliacao() {
      const notaEl = document.querySelector('input[name="nota"]:checked');
      if (!notaEl) return showAlert(currentLang === 'pt' ? 'Selecione uma nota' : 'Select a rating', 'error');
      
      const dados = {
        solicitacao_id: avaliandoSolId,
        avaliado_id: avaliandoId,
        nota: parseInt(notaEl.value),
        comentario: document.getElementById('comentario-nota').value.trim()
      };

      try {
        await api.avaliar(dados);
        showAlert(currentLang === 'pt' ? 'Avaliação enviada!' : 'Evaluation sent!', 'success');
        fecharModal();
      } catch(err) { showAlert(err.message, 'error'); }
    }

    carregarDados();
    document.getElementById('btn-logout')?.addEventListener('click', () => logout());
  </script>
</body>
</html>
