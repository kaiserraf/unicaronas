<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniCaronas — Detalhes da carona</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .detalhe-layout {
      display: grid; grid-template-columns: 1fr 380px;
      gap: 1.5rem; padding-bottom: 3rem;
    }
    .detalhe-rota {
      font-size: 1.3rem; font-weight: 700;
      letter-spacing: -.4px; margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
    }
    .rota-arrow { color: var(--accent); font-size: 1rem; font-weight: 300; }
    .preco-destaque {
      font-size: 2.5rem; font-weight: 700;
      color: var(--text); font-variant-numeric: tabular-nums;
    }
    @media(max-width:860px){ .detalhe-layout{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">Uni<span>Caronas</span></a>
      <div class="navbar-links">
        <a href="buscar.html">Voltar</a>
        <a href="#" onclick="logout()">Sair</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div id="alert-container" style="margin-top:1rem"></div>
    <div id="conteudo" style="padding:2rem 0">
      <p class="text-muted">Carregando...</p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    protegerRota();
    const usuario      = getUser();
    const id           = new URLSearchParams(location.search).get('id');
    let   solicitacaoId = null;
    let   chatInterval  = null;

    if (!id) location.href = 'buscar.html';

    (async () => {
      try {
        const res  = await api.buscarCarona(id);
        const c    = res.data;
        const sou_motorista = c.motorista_id === usuario?.id;

        document.getElementById('conteudo').innerHTML = `
          <div class="detalhe-layout">

            <!-- Coluna principal -->
            <div>
              <div class="page-header" style="padding-top:1.5rem">
                <div class="detalhe-rota fade-up">
                  <span>${c.origem}</span>
                  <span class="rota-arrow">→</span>
                  <span>${c.destino}</span>
                </div>
              </div>

              <div class="card mb-2 fade-up fade-up-1">
                <div class="card-title">Detalhes da viagem</div>
                <div class="info-row"><span class="label">Data e hora</span><span class="value">${formatarData(c.horario_partida)}</span></div>
                <div class="info-row"><span class="label">Vagas disponíveis</span><span class="value">${c.vagas_disponiveis} de ${c.vagas_totais}</span></div>
                <div class="info-row"><span class="label">Status</span><span class="value"><span class="badge badge-green">${c.status}</span></span></div>
                ${c.distancia_km ? `<div class="info-row"><span class="label">Distância estimada</span><span class="value">${c.distancia_km} km</span></div>` : ''}
                ${c.observacoes ? `<div class="info-row"><span class="label">Observações</span><span class="value">${c.observacoes}</span></div>` : ''}
              </div>

              <div class="card fade-up fade-up-2">
                <div class="card-title">Motorista</div>
                <div class="user-row">
                  <div class="avatar avatar-lg">${iniciais(c.motorista_nome)}</div>
                  <div>
                    <div style="font-size:1.05rem;font-weight:700">${c.motorista_nome}</div>
                    <div class="user-rating" style="margin-top:.2rem">${parseFloat(c.motorista_avaliacao||0).toFixed(1)} de avaliação media</div>
                    ${c.motorista_telefone ? `<div style="font-size:.82rem;color:var(--text-3);margin-top:.2rem">${c.motorista_telefone}</div>` : ''}
                  </div>
                </div>
              </div>
            </div>

            <!-- Coluna lateral -->
            <div>
              <div class="card mb-2 fade-up" style="text-align:center;padding:2rem">
                <div style="font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:.5rem">Valor por passageiro</div>
                <div class="preco-destaque">${formatarMoeda(c.valor_cobrado)}</div>
                ${c.valor_sugerido && c.valor_sugerido !== c.valor_cobrado
                  ? `<div style="font-size:.78rem;color:var(--text-3);margin-top:.4rem">Sugestão era ${formatarMoeda(c.valor_sugerido)}</div>`
                  : ''}

                ${!sou_motorista && c.status === 'ativa' ? `
                <div style="margin-top:1.5rem" id="acao-box">
                  <button class="btn btn-success btn-full" onclick="solicitar()">Solicitar vaga</button>
                  <p style="font-size:.76rem;color:var(--text-3);margin-top:.6rem">O pagamento é realizado dentro da plataforma</p>
                </div>` : ''}

                ${sou_motorista ? `
                <div style="margin-top:1.5rem">
                  <span class="badge badge-accent">Sua carona</span>
                </div>` : ''}
              </div>

              <!-- Chat -->
              <div id="chat-box" class="card fade-up" style="display:none;padding:1.25rem">
                <div class="card-title">Conversa</div>
                <div class="chat-wrap" style="height:360px">
                  <div class="chat-messages" id="chat-msgs"></div>
                  <div class="chat-input">
                    <input class="form-control" id="chat-texto" type="text" placeholder="Digite uma mensagem...">
                    <button class="btn btn-primary btn-sm" onclick="enviarMensagem()">Enviar</button>
                  </div>
                </div>
              </div>
            </div>

          </div>`;
      } catch(err) {
        document.getElementById('conteudo').innerHTML =
          `<div class="alert alert-error" style="margin-top:2rem">${err.message}</div>`;
      }
    })();

    async function solicitar() {
      try {
        const res = await api.solicitarVaga(id);
        solicitacaoId = res.data.id;
        showAlert('Solicitação enviada. Aguarde o motorista aceitar.', 'success');
        document.getElementById('acao-box').style.display = 'none';
        iniciarChat();
      } catch(err) { showAlert(err.message, 'error'); }
    }

    function iniciarChat() {
      document.getElementById('chat-box').style.display = 'block';
      carregarMensagens();
      chatInterval = setInterval(carregarMensagens, 5000);
    }

    async function carregarMensagens() {
      if (!solicitacaoId) return;
      try {
        const res  = await api.listarMensagens(solicitacaoId);
        const msgs = res.data;
        const el   = document.getElementById('chat-msgs');
        el.innerHTML = msgs.map(m => {
          const minha = m.remetente_id === usuario?.id;
          const hora  = new Date(m.enviado_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
          return `<div class="mensagem ${minha?'minha':''}">
            ${!minha?`<div style="font-size:.72rem;color:var(--text-3);margin-bottom:.2rem">${m.remetente_nome}</div>`:''}
            <div class="mensagem-bubble">${m.conteudo}</div>
            <div class="mensagem-hora">${hora}</div>
          </div>`;
        }).join('');
        el.scrollTop = el.scrollHeight;
      } catch(_) {}
    }

    async function enviarMensagem() {
      if (!solicitacaoId) return;
      const texto = document.getElementById('chat-texto').value.trim();
      if (!texto) return;
      try {
        await api.enviarMensagem({ solicitacao_id: solicitacaoId, conteudo: texto });
        document.getElementById('chat-texto').value = '';
        carregarMensagens();
      } catch(err) { showAlert(err.message, 'error'); }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.activeElement.id === 'chat-texto') enviarMensagem();
    });
  </script>
</body>
</html>
