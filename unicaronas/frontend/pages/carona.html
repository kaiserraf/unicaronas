<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniCaronas — Detalhes da carona</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .detalhe-layout {
      display: grid; grid-template-columns: 1fr 400px;
      gap: 3rem; padding-bottom: 3rem; align-items: start;
    }
    .detalhe-rota {
      font-size: 1.3rem; font-weight: 700;
      letter-spacing: -.4px; margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
    }
    .rota-arrow { color: var(--accent); font-size: 1rem; font-weight: 300; }
    .preco-destaque {
      font-size: 2.5rem; font-weight: 700;
      color: var(--text); font-variant-numeric: tabular-nums;
    }
    
    /* Star rating */
    .rating-input { display: flex; gap: 0.5rem; flex-direction: row-reverse; justify-content: flex-end; margin: 1rem 0; }
    .rating-input input { display: none; }
    .rating-input label { cursor: pointer; width: 24px; height: 24px; background: var(--border); clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); }
    .rating-input input:checked ~ label, .rating-input label:hover, .rating-input label:hover ~ label { background: var(--amber); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; display: none; }
    .modal-box { background: var(--surface); padding: 2rem; border-radius: var(--radius-lg); width: 100%; max-width: 400px; }

    /* Botão de chat com pulso */
    .btn-chat-iniciar {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--green-dim); color: var(--green);
      border: 1px solid rgba(34,211,160,.25);
      padding: .55rem 1.1rem; border-radius: var(--radius-sm);
      font-family: var(--font); font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: all .18s; white-space: nowrap;
    }
    .btn-chat-iniciar:hover {
      background: rgba(34,211,160,.18);
      border-color: rgba(34,211,160,.45);
      transform: translateY(-1px);
    }
    .btn-chat-iniciar:active { transform: scale(.97); }
    .btn-chat-iniciar svg { flex-shrink: 0; }

    @media(max-width:992px){ 
      .detalhe-layout{ grid-template-columns:1fr; } 
    }
  </style>
</head>
<body>
<nav class="navbar" aria-label="Navegação principal">
  <div class="container" style="position: relative;">
    <button class="navbar-toggle" onclick="document.querySelector('.navbar-links').classList.toggle('active')">
      <span></span><span></span><span></span>
    </button>
    <a href="../pages/dashboard.html" class="navbar-brand">Uni<span>Caronas</span></a>
    
    <ul class="navbar-links" role="list" style="list-style:none;">
      <li><a href="../pages/dashboard.html" data-i18n="nav-dashboard">Painel <span id="nav-painel-badge" class="nav-badge" style="display: none;">0</span></a></li>
      <li><a href="../pages/buscar.html" data-i18n="nav-buscar">Buscar carona</a></li>
      <li><a href="../pages/criar-carona.html" data-i18n="nav-oferecer">Oferecer carona</a></li>
      <li><a href="../pages/perfil.html" data-i18n="nav-perfil">Perfil</a></li>
    </ul>
    <button class="btn btn-ghost btn-sm" id="btn-logout" type="button" data-i18n="nav-sair">Sair</button>
  </div>
</nav>

  <div class="container" style="padding-top:2rem">
    <div id="alert-container"></div>
    
    <div class="detalhe-layout">
      <div class="main-content">
        <!-- Mapa Leaflet reposicionado -->
        <div id="mapa-carona" style="height: 380px; border-radius: var(--radius-lg); margin-bottom: 2rem; display: none; border: 1px solid var(--border); z-index: 10;"></div>

        <div id="conteudo">
          <p class="text-muted" data-i18n="welcome-loading">Carregando...</p>
        </div>

        <div id="area-motorista" style="display:none">
          <div class="section-label" style="margin-top:2.5rem" data-i18n="label-my-requests">Solicitações na sua carona</div>
          <div id="lista-solicitacoes-pendentes"></div>
          <div class="section-label" style="margin-top:1.5rem">Passageiros confirmados</div>
          <div id="lista-solicitacoes-aceitas"></div>
        </div>
      </div>

      <div class="sidebar" id="sidebar-conteudo">
        <!-- Card de preço e botões injetados aqui via JS -->
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container footer-content">
      <div class="footer-logo">Uni<span>Caronas</span></div>
      <div class="footer-dev">Desenvolvido por <a href="#">Ariane Archanjo</a>, <a href="#">Matheus Sizanoski</a>, <a href="#">Pedro Kafka</a> e <a href="#">Rafael Machado</a></div>
      <div class="footer-copyright">© 2026 UniCaronas — Todos os direitos reservados.</div>
    </div>
  </footer>

  <!-- Modal de Avaliação -->
  <div id="modal-avaliacao" class="modal-overlay">
    <div class="modal-box">
      <h3 style="margin-bottom:1rem" data-i18n="ride-modal-rate-title">Avaliar Usuário</h3>
      <div class="form-group">
        <label class="form-label" data-i18n="ride-label-rating">Sua nota</label>
        <div class="rating-input" id="stars">
          <input type="radio" name="nota" value="5" id="s5"><label for="s5"></label>
          <input type="radio" name="nota" value="4" id="s4"><label for="s4"></label>
          <input type="radio" name="nota" value="3" id="s3"><label for="s3"></label>
          <input type="radio" name="nota" value="2" id="s2"><label for="s2"></label>
          <input type="radio" name="nota" value="1" id="s1"><label for="s1"></label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="ride-label-comment">Comentário (opcional)</label>
        <textarea id="comentario-nota" class="form-control" rows="3" data-i18n="ride-placeholder-comment" placeholder="Como foi a experiência?"></textarea>
      </div>
      <div style="display:flex;gap:1rem;margin-top:1.5rem">
        <button class="btn btn-ghost" onclick="fecharModal()" data-i18n="btn-cancel">Cancelar</button>
        <button class="btn btn-primary btn-full" onclick="enviarAvaliacao()" data-i18n="ride-btn-send-rating">Enviar Avaliação</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/chat-global.js"></script>
  <script>
    protegerRota();
    const usuario      = getUser();
    const id           = new URLSearchParams(location.search).get('id');
    let   solicitacaoId = null;
    let   caronaCache   = null;
    let   avaliandoId = null;
    let   avaliandoSolId = null;

    if (!id) location.href = 'buscar.html';

    window.addEventListener('languageChanged', () => carregarDados());

    async function carregarDados() {
      try {
        const res  = await api.buscarCarona(id);
        const c    = res.data;
        caronaCache = c;
        const sou_motorista = c.motorista_id === usuario?.id;

        let minhaSol = null;
        if (!sou_motorista) {
          const resSol = await api.minhaSolicitacao(id);
          minhaSol = resSol.data;
          solicitacaoId = minhaSol?.id;
        }

        const showChat = (sou_motorista) || (minhaSol?.status === 'aceita');
        
        const pagamentoHtml = (!sou_motorista && minhaSol?.status === 'aceita') ? `
          <div class="card mb-2 fade-up" style="background: var(--green-dim); border: 1px solid rgba(34,211,160,.3)">
            <div style="display:flex; align-items:center; justify-content:space-between; gap:1rem">
              <div>
                <div style="font-weight:700; color:var(--green)">${t('ride-status-confirmed')}</div>
                <div style="font-size:0.85rem; color:var(--text-2)">Realize o pagamento para garantir sua vaga.</div>
              </div>
              <a href="pagamento.html?solicitacao_id=${minhaSol.id}&carona_id=${id}&valor=${c.valor_cobrado}" class="btn btn-success btn-sm">Pagar ${formatarMoeda(c.valor_cobrado)}</a>
            </div>
          </div>` : '';

        // Injeção de conteúdo principal
        document.getElementById('conteudo').innerHTML = `
          <div class="page-header" style="padding-top:1.5rem">
            <div class="detalhe-rota fade-up">
              <span>${c.origem}</span>
              <span class="rota-arrow">→</span>
              <span>${c.destino}</span>
            </div>
          </div>
          <div class="card mb-2 fade-up fade-up-1">
            <div class="card-title">${t('ride-details-title')}</div>
            <div class="info-row"><span class="label">${t('label-datetime')}</span><span class="value">${formatarData(c.horario_partida)}</span></div>
            <div class="info-row"><span class="label">${t('card-vagas')}</span><span class="value">${c.vagas_disponiveis} ${t('of') || 'de'} ${c.vagas_totais}</span></div>
            <div class="info-row"><span class="label">Status</span><span class="value"><span class="badge ${c.status === 'concluida' ? 'badge-green' : 'badge-accent'}">${c.status}</span></span></div>
            ${c.distancia_km ? `<div class="info-row"><span class="label">${t('card-dist')}</span><span class="value">${c.distancia_km} km</span></div>` : ''}
            ${c.observacoes ? `<div class="info-row"><span class="label">${t('label-obs')}</span><span class="value">${c.observacoes}</span></div>` : ''}
          </div>
          <div class="card fade-up fade-up-2">
            <div class="card-title">${t('profile-stats-driver')}</div>
            <div class="user-row">
              <div class="avatar avatar-lg">${iniciais(c.motorista_nome)}</div>
              <div>
                <div style="font-size:1.05rem;font-weight:700">${c.motorista_nome}</div>
                <div class="user-rating" style="margin-top:.2rem">${parseFloat(c.motorista_avaliacao||0).toFixed(1)} ★ ${t('profile-stats-rating')}</div>
                ${c.motorista_telefone ? `<div style="font-size:.82rem;color:var(--text-3);margin-top:.2rem">${c.motorista_telefone}</div>` : ''}
              </div>
            </div>
          </div>
        `;

        // Injeção de Sidebar
        document.getElementById('sidebar-conteudo').innerHTML = `
          ${pagamentoHtml}
          <div class="card mb-2 fade-up" style="text-align:center;padding:2.5rem 2rem">
            <div style="font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:.5rem">${t('card-price-per-person')}</div>
            <div class="preco-destaque">${formatarMoeda(c.valor_cobrado)}</div>
            
            ${!sou_motorista && !minhaSol && c.status === 'ativa' && c.vagas_disponiveis > 0 ? `
            <div style="margin-top:2rem">
              <button class="btn btn-success btn-full btn-lg" onclick="solicitar()">${t('ride-btn-request')}</button>
            </div>` : ''}

            ${!sou_motorista && minhaSol?.status === 'aceita' ? `
            <div style="margin-top:2rem">
              <span class="badge badge-green">${t('ride-status-confirmed')}</span>
              <button class="btn btn-primary btn-full mt-1" onclick="abrirModal(${c.motorista_id}, ${minhaSol.id})">${t('ride-btn-rate-driver')}</button>
              <button class="btn btn-chat-iniciar btn-full mt-1" onclick="abrirChatMotorista(${minhaSol.id}, '${c.motorista_nome}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                ${t('ride-chat-title')}
              </button>
            </div>` : ''}

            ${!sou_motorista && minhaSol?.status === 'pendente' ? `
            <div style="margin-top:2rem"><span class="badge badge-accent">${t('ride-status-waiting')}</span></div>` : ''}

            ${sou_motorista && c.status !== 'concluida' ? `
            <div style="margin-top:2rem">
              <button class="btn btn-success btn-full btn-lg" onclick="concluirCarona()">${t('ride-btn-finish')}</button>
            </div>` : ''}
            
            ${sou_motorista && c.status === 'concluida' ? `
            <div style="margin-top:2rem"><span class="badge badge-green">${t('ride-status-finished')}</span></div>` : ''}
          </div>
        `;

        if (sou_motorista) {
          document.getElementById('area-motorista').style.display = 'block';
          carregarSolicitacoes();
        }

        if (c.origem && c.destino) {
          initMapa(c.origem, c.destino);
        }

      } catch(err) {
        document.getElementById('conteudo').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    async function initMapa(origem, destino) {
      try {
        const geo = async (q) => fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`).then(r => r.json());
        const [resO, resD] = await Promise.all([geo(origem), geo(destino)]);
        if (!resO[0] || !resD[0]) return;

        document.getElementById('mapa-carona').style.display = 'block';
        const map = L.map('mapa-carona', { zoomControl: false });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const pO = [resO[0].lat, resO[0].lon], pD = [resD[0].lat, resD[0].lon];
        L.marker(pO).addTo(map).bindPopup('Origem');
        L.marker(pD).addTo(map).bindPopup('Destino');
        map.fitBounds(L.latLngBounds([pO, pD]), { padding: [40, 40] });
      } catch (e) {}
    }

    async function carregarSolicitacoes() {
      try {
        const res = await api.solicitacoesCarona(id);
        const pendentes = res.data.filter(s => s.status === 'pendente');
        const aceitas   = res.data.filter(s => s.status === 'aceita');

        document.getElementById('lista-solicitacoes-pendentes').innerHTML = pendentes.map(s => `
          <div class="card mb-2" style="border-left: 4px solid var(--amber)">
            <div style="display:flex; justify-content:space-between; align-items:center">
              <div class="user-row">
                <div class="avatar">${iniciais(s.passageiro_nome)}</div>
                <div><strong>${s.passageiro_nome}</strong><br><small>${s.passageiro_curso || '—'}</small></div>
              </div>
              <div style="display:flex; gap:0.5rem">
                <button class="btn btn-success btn-sm" onclick="responder(${s.id}, 'aceita')">Aceitar</button>
                <button class="btn btn-danger btn-sm" onclick="responder(${s.id}, 'recusada')">Recusar</button>
              </div>
            </div>
          </div>`).join('') || '<p class="text-muted">Nenhuma solicitação pendente.</p>';

        document.getElementById('lista-solicitacoes-aceitas').innerHTML = aceitas.map(s => `
          <div class="card mb-2" style="border-left: 4px solid var(--green)">
            <div style="display:flex; justify-content:space-between; align-items:center">
              <div class="user-row">
                <div class="avatar">${iniciais(s.passageiro_nome)}</div>
                <div><strong>${s.passageiro_nome}</strong></div>
              </div>
              <div style="display:flex; gap:0.5rem">
                <button class="btn btn-primary btn-sm" onclick="abrirChatMotorista(${s.id}, '${s.passageiro_nome}')">${t('ride-chat-title')}</button>
                <button class="btn btn-ghost btn-sm" onclick="abrirModal(${s.passageiro_id}, ${s.id})">${t('ride-btn-rate-driver').split(' ')[0]}</button>
              </div>
            </div>
          </div>`).join('') || '<p class="text-muted">Nenhum passageiro confirmado.</p>';
      } catch (err) {}
    }

    async function responder(sid, status) {
      try {
        await api.responderSolicitacao(sid, status);
        showAlert(`Solicitação ${status}!`, 'success');
        carregarDados();
      } catch (err) { showAlert(err.message, 'error'); }
    }

    function abrirChatMotorista(sid, nome) {
      if (window.UCChat) {
        window.UCChat.iniciarChat(sid, {
          titulo: caronaCache ? `${caronaCache.origem.split(',')[0]} → ${caronaCache.destino.split(',')[0]}` : 'Conversa',
          outraPessoa: nome,
          subtitulo: caronaCache?.motorista_id === usuario.id ? `Passageiro: ${nome}` : `Motorista: ${nome}`
        });
      }
    }

    async function solicitar() {
      try {
        await api.solicitarVaga(id);
        showAlert('Solicitação enviada!', 'success');
        carregarDados();
      } catch(err) { showAlert(err.message, 'error'); }
    }

    async function concluirCarona() {
      if (!confirm('Concluir esta carona?')) return;
      try {
        await api.concluirCarona(id);
        showAlert('Carona concluída!', 'success');
        carregarDados();
      } catch(err) { showAlert(err.message, 'error'); }
    }

    function abrirModal(avaliadoId, solId) {
      avaliandoId = avaliadoId; avaliandoSolId = solId;
      document.getElementById('modal-avaliacao').style.display = 'flex';
    }
    function fecharModal() { document.getElementById('modal-avaliacao').style.display = 'none'; }

    async function enviarAvaliacao() {
      const notaEl = document.querySelector('input[name="nota"]:checked');
      if (!notaEl) return;
      try {
        await api.avaliar({ solicitacao_id: avaliandoSolId, avaliado_id: avaliandoId, nota: parseInt(notaEl.value), comentario: document.getElementById('comentario-nota').value });
        fecharModal(); showAlert('Avaliação enviada!', 'success');
      } catch(err) { showAlert(err.message, 'error'); }
    }

    carregarDados();
    document.getElementById('btn-logout')?.addEventListener('click', () => logout());
  </script>
</body>
</html>
