<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniCaronas — Criar conta</title>
  <link rel="icon" type="image/png" href="../img/icon.png?v=2">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/theme.js"></script>
  <style>
    body {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 2rem 1rem;
      background: var(--bg);
    }
    .cadastro-wrap { width: 100%; max-width: 500px; }
    .cadastro-header { margin-bottom: 2rem; position: relative; }
    .cadastro-brand { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 1.5rem; display: inline-block; }
    .cadastro-brand span { color: var(--accent-2); }
    .cadastro-title { font-size: 1.55rem; font-weight: 700; letter-spacing: -.4px; }
    .cadastro-subtitle { color: var(--text-3); font-size: .88rem; margin-top: .3rem; }

    /* Estilo aprimorado para Seleção de Perfil */
    .profile-selection {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .profile-card {
      position: relative;
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1.25rem 0.75rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .profile-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }
    .profile-card input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .profile-card.active {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .profile-card.active .profile-icon-circle {
      background: var(--accent);
      color: white;
    }
    .profile-card.active strong {
      color: var(--accent);
    }
    .profile-icon-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
      transition: all 0.2s;
    }
    .profile-card strong {
      display: block;
      font-size: 0.9rem;
      color: var(--text);
      transition: color 0.2s;
    }
    .profile-card span {
      font-size: 0.72rem;
      color: var(--text-3);
      line-height: 1.3;
    }
    .check-mark {
      position: absolute;
      top: 8px;
      right: 8px;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .profile-card.active .check-mark {
      opacity: 1;
    }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      .cadastro-wrap { padding: 1rem 0; }
      .grid-2, .profile-selection { grid-template-columns: 1fr; }
      .profile-card { flex-direction: row; text-align: left; padding: 1rem; gap: 1rem; }
      .profile-icon-circle { width: 40px; height: 40px; flex-shrink: 0; }
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="cadastro-wrap fade-up" style="margin: 1.5rem auto 0 auto;">
    <div class="cadastro-header">
      <h1 class="cadastro-title" data-i18n="register-title">Criar sua conta</h1>
      <p class="cadastro-subtitle" data-i18n="register-sub">Use o e-mail da sua universidade para se cadastrar</p>
    </div>

    <div class="card">
      <div id="alert-container"></div>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label" data-i18n="label-full-name">Nome completo</label>
          <input class="form-control" id="nome" type="text" placeholder="Seu nome" data-i18n="label-full-name">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="label-matricula">Matrícula</label>
          <input class="form-control" id="matricula" type="text" placeholder="2024001" data-i18n="label-matricula">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="label-email">E-mail institucional</label>
        <input class="form-control" id="email" type="email" placeholder="seu@unibrasil.com.br" data-i18n="label-email">
        <span class="form-hint" data-i18n="register-email-hint">Apenas e-mails da sua universidade são aceitos</span>
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label" data-i18n="label-course">Curso</label>
          <input class="form-control" id="curso" type="text" placeholder="Engenharia de Software" data-i18n="label-course">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="label-phone">Telefone</label>
          <input class="form-control" id="telefone" type="tel" placeholder="(41) 99999-0000" data-i18n="label-phone">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Como você usará o UniCaronas?</label>
        <div class="profile-selection">
          <label class="profile-card active" onclick="selectProfile(this)">
            <input type="radio" name="perfil_tipo" value="estudante" checked>
            <div class="check-mark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
            <div class="profile-icon-circle">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <div>
              <strong>Passageiro</strong>
              <span>Vou apenas buscar caronas</span>
            </div>
          </label>

          <label class="profile-card" onclick="selectProfile(this)">
            <input type="radio" name="perfil_tipo" value="motorista">
            <div class="check-mark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
            <div class="profile-icon-circle">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
            </div>
            <div>
              <strong>Motorista</strong>
              <span>Vou apenas oferecer caronas</span>
            </div>
          </label>

          <label class="profile-card" onclick="selectProfile(this)">
            <input type="radio" name="perfil_tipo" value="misto">
            <div class="check-mark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
            <div class="profile-icon-circle">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            </div>
            <div>
              <strong>Misto</strong>
              <span>Quero ambas as opções</span>
            </div>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="dia_ead">Meu dia EAD (Opcional)</label>
        <select id="dia_ead" class="form-control">
          <option value="">Não possuo dia EAD fixo</option>
          <option value="1">Segunda-feira</option>
          <option value="2">Terça-feira</option>
          <option value="3">Quarta-feira</option>
          <option value="4">Quinta-feira</option>
          <option value="5">Sexta-feira</option>
          <option value="6">Sábado</option>
          <option value="0">Domingo</option>
        </select>
      </div>

      <div id="veiculo-section" style="display:none; border-top: 1px solid var(--border); margin-top: 1.5rem; padding-top: 1.5rem;">
        <h3 style="font-size: 1rem; margin-bottom: 1rem;">Dados do Veículo</h3>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Marca</label>
            <input class="form-control" id="v-marca" type="text" placeholder="Ex: Toyota">
          </div>
          <div class="form-group">
            <label class="form-label">Modelo</label>
            <input class="form-control" id="v-modelo" type="text" placeholder="Ex: Corolla">
          </div>
        </div>
        <div class="grid-3" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Ano</label>
            <input class="form-control" id="v-ano" type="number" placeholder="2022">
          </div>
          <div class="form-group">
            <label class="form-label">Cor</label>
            <input class="form-control" id="v-cor" type="text" placeholder="Prata">
          </div>
          <div class="form-group">
            <label class="form-label">Placa</label>
            <input class="form-control" id="v-placa" type="text" placeholder="ABC-1234">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="label-password">Senha</label>
        <input class="form-control" id="senha" type="password" placeholder="Mínimo 8 caracteres" data-i18n="label-password">
      </div>

      <button class="btn btn-primary btn-full mt-2" onclick="cadastrar()" id="btn-cadastrar" data-i18n="btn-register">
        Criar conta
      </button>

      <p class="text-center text-muted mt-2" style="font-size:.85rem">
        <span data-i18n="register-has-account">Já tem conta?</span> <a href="login.html" data-i18n="register-login-now">Entrar</a>
      </p>
    </div>
  </div>

  <footer class="footer" style="width: 100%; margin-top: 4rem;">
    <div class="container footer-content">
      <div class="navbar-brand-img" style="margin-bottom: 1rem;"></div>
      <div class="footer-dev"><span data-i18n="footer-dev-by">Desenvolvido por</span> <a href="#">Ariane Archanjo</a>, <a href="#">Matheus Sizanoski</a>, <a href="#">Pedro Kafka</a> e <a href="#">Rafael Machado</a></div>
      <div class="footer-copyright" data-i18n="footer-rights">© 2026 UniCaronas — Todos os direitos reservados.</div>
    </div>
  </footer>

  <script src="../js/api.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    function selectProfile(el) {
      document.querySelectorAll('.profile-card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      const radio = el.querySelector('input');
      radio.checked = true;
      
      const veiculoSec = document.getElementById('veiculo-section');
      if (radio.value === 'motorista' || radio.value === 'misto') {
        veiculoSec.style.display = 'block';
      } else {
        veiculoSec.style.display = 'none';
      }
    }

    async function cadastrar() {
      const diaEadVal = document.getElementById('dia_ead').value;
      const perfilTipo = document.querySelector('input[name="perfil_tipo"]:checked').value;
      
      const dados = {
        nome:        document.getElementById('nome').value.trim(),
        email:       document.getElementById('email').value.trim(),
        matricula:   document.getElementById('matricula').value.trim(),
        curso:       document.getElementById('curso').value.trim(),
        telefone:    document.getElementById('telefone').value.trim(),
        dia_ead:     diaEadVal !== '' ? parseInt(diaEadVal, 10) : null,
        perfil_tipo: perfilTipo,
        senha:       document.getElementById('senha').value,
      };

      if (perfilTipo === 'motorista' || perfilTipo === 'misto') {
        dados.veiculo = {
          marca:  document.getElementById('v-marca').value.trim(),
          modelo: document.getElementById('v-modelo').value.trim(),
          ano:    document.getElementById('v-ano').value,
          cor:    document.getElementById('v-cor').value.trim(),
          placa:  document.getElementById('v-placa').value.trim()
        };
        
        if (!dados.veiculo.marca || !dados.veiculo.placa) {
          return showAlert(currentLang === 'pt' ? 'Para motoristas, marca e placa do veículo são obrigatórios' : 'For drivers, vehicle brand and plate are required', 'error');
        }
      }

      if (!dados.nome || !dados.email || !dados.matricula || !dados.senha) {
        return showAlert(currentLang === 'pt' ? 'Preencha nome, e-mail, matrícula e senha' : 'Fill in name, email, student ID and password', 'error');
      }
      if (dados.senha.length < 8) {
        return showAlert(currentLang === 'pt' ? 'A senha deve ter ao menos 8 caracteres' : 'The password must have at least 8 characters', 'error');
      }

      const btn = document.getElementById('btn-cadastrar');
      btn.disabled = true; btn.textContent = currentLang === 'pt' ? 'Criando conta...' : 'Creating account...';

      try {
        const res = await api.cadastrar(dados);
        showAlert(currentLang === 'pt' ? 'Conta criada com sucesso! Entrando...' : 'Account created successfully! Logging in...', 'success');
        
        // Auto-login com os dados retornados
        if (res.data && res.data.token) {
          setToken(res.data.token);
          setUser(res.data.usuario);
          setTimeout(() => window.location.href = 'dashboard.html', 1500);
        } else {
          setTimeout(() => window.location.href = 'login.html', 2000);
        }
      } catch (err) {
        showAlert(err.message, 'error');
        btn.disabled = false; btn.textContent = currentLang === 'pt' ? 'Criar conta' : 'Create account';
      }
    }
  </script>
</body>
</html>
