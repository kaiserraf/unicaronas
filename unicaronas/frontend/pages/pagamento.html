<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento — UniCaronas</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .pagamento-card {
      max-width: 500px; margin: 4rem auto; padding: 2.5rem;
    }
    .resumo-valores {
      background: var(--bg-2); padding: 1.5rem; border-radius: var(--radius-md);
      margin: 1.5rem 0; border: 1px solid var(--border);
    }
    .valor-item {
      display: flex; justify-content: space-between; margin-bottom: 0.75rem;
      font-size: 0.95rem;
    }
    .valor-total {
      border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 1rem;
      font-weight: 700; font-size: 1.2rem; color: var(--accent);
    }
    .metodos-pagamento {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem;
    }
    .metodo-card {
      border: 2px solid var(--border); border-radius: var(--radius-sm);
      padding: 1rem; text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .metodo-card:hover { border-color: var(--accent-light); background: var(--bg-3); }
    .metodo-card.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    .metodo-card svg { margin-bottom: 0.5rem; display: block; margin-inline: auto; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="dashboard.html" class="navbar-brand">Uni<span>Caronas</span></a>
    </div>
  </nav>

  <div class="container">
    <div id="alert-container"></div>
    <div class="card pagamento-card fade-up">
      <h2 style="margin-bottom:0.5rem">Finalizar Pagamento</h2>
      <p class="text-muted">Confirme os detalhes da sua carona.</p>

      <div class="resumo-valores" id="resumo">
        <div class="valor-item">
          <span>Valor da carona</span>
          <span id="valor-carona">R$ 0,00</span>
        </div>
        <div class="valor-item">
          <span title="Taxa de manutenção da plataforma">Taxa UniCaronas (10%)</span>
          <span id="valor-taxa" style="color: var(--red)">R$ 0,00</span>
        </div>
        <div class="valor-item valor-total">
          <span>Total a pagar</span>
          <span id="total-pagar">R$ 0,00</span>
        </div>
        <div style="font-size: 0.75rem; color: var(--text-3); margin-top: 0.5rem; text-align: right;">
          Repasse ao motorista: <span id="valor-motorista">R$ 0,00</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Selecione o método</label>
        <div class="metodos-pagamento">
          <div class="metodo-card active" onclick="setMetodo(this, 'cartao_credito')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
            Cartão
          </div>
          <div class="metodo-card" onclick="setMetodo(this, 'pix')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            PIX
          </div>
          <div class="metodo-card" onclick="setMetodo(this, 'dinheiro')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
            Dinheiro
          </div>
        </div>
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="btn-confirmar" onclick="confirmarPagamento()">Confirmar Pagamento</button>
      <button class="btn btn-ghost btn-full mt-1" onclick="history.back()">Voltar</button>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    protegerRota();
    const params = new URLSearchParams(location.search);
    const sid    = params.get('solicitacao_id');
    const cid    = params.get('carona_id');
    const valor  = parseFloat(params.get('valor') || 0);
    let   metodoSelected = 'cartao_credito';

    if (!sid || !valor) location.href = 'dashboard.html';

    function init() {
      const taxa = valor * 0.10;
      const repasse = valor - taxa;

      document.getElementById('valor-carona').textContent = formatarMoeda(valor);
      document.getElementById('valor-taxa').textContent   = '- ' + formatarMoeda(taxa);
      document.getElementById('total-pagar').textContent   = formatarMoeda(valor);
      document.getElementById('valor-motorista').textContent = formatarMoeda(repasse);
    }

    function setMetodo(el, m) {
      document.querySelectorAll('.metodo-card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      metodoSelected = m;
    }

    async function confirmarPagamento() {
      const btn = document.getElementById('btn-confirmar');
      btn.disabled = true;
      btn.textContent = 'Processando...';

      try {
        await api.pagar({ solicitacao_id: sid, metodo: metodoSelected });
        showAlert('Pagamento realizado com sucesso!', 'success');
        setTimeout(() => {
          location.href = `carona.html?id=${cid}`;
        }, 1500);
      } catch (err) {
        showAlert(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Confirmar Pagamento';
      }
    }

    init();
  </script>
</body>
</html>
