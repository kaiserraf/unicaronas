<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniCaronas — Pagamento</title>
  <link rel="icon" type="image/png" href="../img/icon.png?v=2">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/theme.js"></script>
  <style>
    .metodo-card {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.25rem; border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer; transition: .2s;
      background: var(--bg-3);
    }
    .metodo-card:hover { border-color: var(--accent); background: var(--surface); }
    .metodo-card.active { border-color: var(--accent); background: var(--accent-glow); }
    .metodo-card input { display: none; }
    .metodo-icon {
      width: 40px; height: 40px; border-radius: 8px;
      background: var(--surface-2); display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="container" style="padding-top: 2rem; padding-bottom: 4rem;">
    <div class="page-header fade-up" style="padding-top:0">
      <h2 data-i18n="pay-title">Confirmar reserva</h2>
      <p data-i18n="pay-sub">Escolha a forma de pagamento para sua vaga</p>
    </div>

    <div class="card mb-2 fade-up">
      <div class="card-title" data-i18n="pay-summary">Resumo da carona</div>
      <div id="resumo-carona">
        <p class="text-muted" data-i18n="welcome-loading">Carregando...</p>
      </div>
    </div>

    <div class="card fade-up">
      <div class="card-title" data-i18n="pay-method">Forma de pagamento</div>
      <div id="alert-container"></div>

      <form id="form-pagamento">
        <div style="display:flex; flex-direction:column; gap:1rem">
          <label class="metodo-card active">
            <input type="radio" name="metodo" value="pix" checked>
            <div class="metodo-icon">💎</div>
            <div>
              <div style="font-weight:600; font-size:.9rem">Pix</div>
              <div style="font-size:.75rem; color:var(--text-3)">Aprovação imediata</div>
            </div>
          </label>
          <label class="metodo-card">
            <input type="radio" name="metodo" value="cartao_credito">
            <div class="metodo-icon">💳</div>
            <div>
              <div style="font-weight:600; font-size:.9rem">Cartão de Crédito</div>
              <div style="font-size:.75rem; color:var(--text-3)">Até 12x com juros</div>
            </div>
          </label>
          <label class="metodo-card">
            <input type="radio" name="metodo" value="dinheiro">
            <div class="metodo-icon">💵</div>
            <div>
              <div style="font-weight:600; font-size:.9rem">Dinheiro</div>
              <div style="font-size:.75rem; color:var(--text-3)">Pague diretamente ao motorista</div>
            </div>
          </label>
        </div>

        <div class="divider"></div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem">
          <span style="font-weight:600; color:var(--text-2)" data-i18n="pay-total">Total a pagar</span>
          <span id="valor-total" style="font-size:1.5rem; font-weight:700; color:var(--text)">R$ 0,00</span>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="btn-confirmar" data-i18n="pay-btn-confirm">Confirmar e Pagar</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-content">
      <div class="navbar-brand-img" style="margin-bottom: 1rem;"></div>
      <div class="footer-dev">Desenvolvido pelas divas: <a href="#">Ariane Archanjo</a>, <a href="#">Matheus Sizanoski</a>, <a href="#">Pedro Kafka</a> e <a href="#">Rafael Machado</a></div>
      <div class="footer-copyright">© 2026 UniCaronas — Todos os direitos reservados.</div>
    </div>
  </footer>

  <script src="../js/api.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    protegerRota();
    const params = new URLSearchParams(location.search);
    const solId = params.get('solicitacao_id');
    const carId = params.get('carona_id');
    const valor = params.get('valor');

    if (!solId || !carId) location.href = 'dashboard.html';

    async function carregarResumo() {
      try {
        const res = await api.buscarCarona(carId);
        const c = res.data;
        document.getElementById('resumo-carona').innerHTML = `
          <div style="font-weight:600; font-size:1rem; margin-bottom:.5rem">${c.origem} → ${c.destino}</div>
          <div class="text-muted" style="font-size:.85rem">${formatarData(c.horario_partida)}</div>
          <div class="text-muted" style="font-size:.85rem">${t('profile-stats-driver')}: ${c.motorista_nome}</div>
        `;
        document.getElementById('valor-total').textContent = formatarMoeda(valor);
      } catch(e) {}
    }

    document.querySelectorAll('.metodo-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.metodo-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
      });
    });

    document.getElementById('form-pagamento').addEventListener('submit', async (e) => {
      e.preventDefault();
      const metodo = document.querySelector('input[name="metodo"]:checked').value;
      const btn = document.getElementById('btn-confirmar');
      
      btn.disabled = true;
      btn.textContent = currentLang === 'pt' ? 'Processando...' : 'Processing...';

      try {
        await api.pagar({ solicitacao_id: parseInt(solId), metodo });
        showAlert(currentLang === 'pt' ? 'Pagamento realizado com sucesso!' : 'Payment successful!', 'success');
        setTimeout(() => location.href = `carona.html?id=${carId}`, 1500);
      } catch(err) {
        showAlert(err.message, 'error');
        btn.disabled = false;
        btn.textContent = t('pay-btn-confirm');
      }
    });

    carregarResumo();
  </script>
</body>
</html>
